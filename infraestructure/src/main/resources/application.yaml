server:
  port: ${WEDGE_AUTH_SERVER_PORT:9001}
  servlet:
    context-path: /
    session:
      timeout: ${wedge.session.ttl:600}s # Uses wedge TTL setting, defaults to 600s

spring:
  application:
    name: wedge-authorization-server
  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
  threads:
    virtual:
      enabled: true
  # Spring Session Configuration (for HTTP session replication when wedge.session.storage-type=redis)
  session:
    store-type: none  # Controlled by wedge.session.storage-type via @ConditionalOnProperty
    redis:
      namespace: ${REDIS_SESSION_NAMESPACE:wedge:http:session}
      configure-action: none  # Use existing Redis configuration



# WedgeAuth Configuration
wedge:
  # Client Storage Configuration
  client-storage:
    type: ${CLIENT_STORAGE_TYPE:none} # Options: none, postgresql, mysql, sqlserver
    # Database settings (only used when type != none)
    url: ${CLIENT_DB_URL:jdbc:postgresql://localhost:5432/oauth2_clients}
    username: ${CLIENT_DB_USERNAME:postgres}
    password: ${CLIENT_DB_PASSWORD:postgres}
    driver-class-name: ${CLIENT_DB_DRIVER:org.postgresql.Driver}
    schema-name: ${CLIENT_DB_SCHEMA:public}
    auto-create-schema: ${CLIENT_DB_AUTO_CREATE_SCHEMA:false}
    # HikariCP connection pool settings
    max-pool-size: ${CLIENT_DB_POOL_SIZE:10}
    min-idle: ${CLIENT_DB_MIN_IDLE:5}
    connection-timeout: ${CLIENT_DB_CONNECTION_TIMEOUT:30000}
    idle-timeout: ${CLIENT_DB_IDLE_TIMEOUT:600000}
    max-lifetime: ${CLIENT_DB_MAX_LIFETIME:1800000}
    auto-commit: ${CLIENT_DB_AUTO_COMMIT:true}

  # Tenant Configuration - each tenant has one user provider
  tenants:
    - id: default-tenant
      name: Default Tenant
      user-provider:
        endpoint: ${USER_PROVIDER_ENDPOINT:http://localhost:8081/api/users/validate}
        timeout: 5000 # milliseconds

  # OAuth Client Configuration
  clients:
    - client-id: public-spa-client
      client-secret: # No secret for public clients
      client-name: Public SPA Client
      client-authentication-methods:
        - none
      authorization-grant-types:
        - authorization_code
        - refresh_token
      redirect-uris:
        - http://localhost:3000/callback
        - http://localhost:3000/silent-renew
      post-logout-redirect-uris:
        - http://localhost:3000/
      scopes:
        - openid
        - profile
        - email
        - read
        - write
        - offline_access  # Required for refresh token issuance
      require-authorization-consent: false
      require-pkce: true
      tenant-id: default-tenant

    - client-id: confidential-backend-client
      client-secret: ${CONFIDENTIAL_CLIENT_SECRET:secret}
      client-name: Confidential Backend Client
      client-authentication-methods:
        - client_secret_basic
        - client_secret_post
      authorization-grant-types:
        - client_credentials
        - authorization_code
        - refresh_token
      redirect-uris:
        - http://localhost:8082/callback
      scopes:
        - openid
        - profile
        - email
        - admin
        - offline_access  # Required for refresh token issuance
      require-authorization-consent: false
      require-pkce: true
      tenant-id: default-tenant

  # Session Storage Configuration
  session:
    storage-type: ${SESSION_STORAGE_TYPE:in-memory} # Options: in-memory, redis
    ttl: 600 # seconds (10 minutes) - applies to both in-memory and Redis
    max-size: 10000 # Max sessions in cache (for in-memory storage only)
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:passwordtest}
      username: ${REDIS_USERNAME:redistest}
      database: ${REDIS_DATABASE:0}
      namespace: ${REDIS_SESSION_NAMESPACE:wedge:session} # Key prefix for all session keys
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

  # OAuth2 Token Configuration
  oauth2:
    tokens:
      refresh-token-enabled: ${IS_REFRESH_TOKEN_ENABLED:true}  # Enable/disable refresh tokens
      access-token-ttl: ${ACCESS_TOKEN_TTL:1800}  # 30 minutes (in seconds)
      refresh-token-ttl: ${REFRESH_TOKEN_TTL:2592000}  # 30 days (in seconds)

  # OAuth2 Token Storage Configuration
  token-storage:
    type: ${wedge.session.storage-type}  # Options: in-memory, redis
    max-ttl: 2592000  # Max storage TTL (30 days) - used as fallback/cap
    max-size: 50000  # Max authorizations in Caffeine cache
    redis:
      namespace: ${REDIS_TOKEN_NAMESPACE:wedge:oauth2:auth}
      # Inherits connection settings from session.redis

  # JWT Configuration
  jwt:
    issuer: ${JWT_ISSUER:http://localhost:9001}
    key-type: ${JWT_KEY_TYPE:test} # Options: test, file
    key-size: ${JWT_KEY_SIZE:2048} # Only used when key-type=test (2048, 4096)
    private-key-path: ${JWT_PRIVATE_KEY_PATH:} # Required when key-type=file
    public-key-path: ${JWT_PUBLIC_KEY_PATH:} # Required when key-type=file

  # Supported Scopes (comma-separated list of scope names)
  scopes: ${WEDGE_SCOPES:openid,profile,email,read,write,admin,offline_access}

  # Frontend Configuration
  frontend:
    # Optional: External paths for customization (uncomment to use)
    # templates-path: file:///path/to/custom/templates
    # static-path: file:///path/to/custom/static
    # i18n-basename: file:///path/to/custom/i18n/messages
    i18n-basename: classpath:i18n/messages
    default-locale: en
    supported-locales:
      - en
      - es

# Logging
logging:
  level:
    root: INFO
    com.kuneiform: DEBUG
    com.kuneiform.infraestructure.config.OAuth2TokenGeneratorConfig: DEBUG
    org.springframework.security.oauth2.server.authorization.token: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.web: TRACE
    org.springframework.security.oauth2: TRACE

management:
  endpoints:
    web:
      exposure:
        include: "*"